version: '3'

includes:
  common: ../Taskfile.yml

# Linux Taskfile — mirrors build/windows/Taskfile.yml, minus MSIX/NSIS/signing.
# GUI builds on Linux require CGO=1: Wails v3 alpha's Linux backend
# (menu/menuitem/webview_window_linux.go) references a `pointer` type that is
# only defined under the `cgo` build constraint (linux_cgo.go / linux_cgo_gtk3.go);
# with CGO=0 the build fails with "undefined: pointer".
# System deps (Ubuntu 24.04+ / Debian bookworm+):
#   sudo apt install -y libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config
# For pure-Go headless/server binaries (no GUI), the server target under
# ../Taskfile.yml can still be built with CGO_ENABLED=0 (pure-Go SQLite via
# glebarez) by passing CGO_ENABLED=0 explicitly.

tasks:
  build:
    summary: Builds the application for Linux
    deps:
      - task: common:go:mod:tidy
      - task: common:build:frontend
        vars:
          BUILD_FLAGS:
            ref: .BUILD_FLAGS
          OBFUSCATED:
            ref: .OBFUSCATED
          DEV:
            ref: .DEV
      - task: common:generate:icons
    cmds:
      # DEV keeps symbols + inlining for debuggability; production build strips
      # + trimpath + tags production, mirroring the Windows target.
      - '{{if eq .OBFUSCATED "true"}}garble {{.GARBLE_ARGS}} build{{else}}go build{{end}} {{.BUILD_FLAGS}} -o "{{.BIN_DIR}}/{{.APP_NAME}}"'
    vars:
      BUILD_FLAGS: '{{if eq .DEV "true"}}{{if or .EXTRA_TAGS (eq .OBFUSCATED "true")}}-tags {{if eq .OBFUSCATED "true"}}wails_obfuscated{{if .EXTRA_TAGS}},{{end}}{{end}}{{.EXTRA_TAGS}} {{end}}-buildvcs=false -gcflags=all="-l"{{else}}-tags production{{if eq .OBFUSCATED "true"}},wails_obfuscated{{end}}{{if .EXTRA_TAGS}},{{.EXTRA_TAGS}}{{end}} -trimpath -buildvcs=false -ldflags="-w -s"{{end}}'
    env:
      GOOS: linux
      CGO_ENABLED: '{{.CGO_ENABLED | default "1"}}'
      GOARCH: '{{.ARCH | default ARCH}}'

  package:
    summary: Packages the Linux build (deb / rpm / tar.gz via nfpm)
    desc: |
      Requires nfpm in PATH. Install: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest
      Set FORMAT to select packager: deb (default) | rpm | archlinux
    deps:
      - task: build
    cmds:
      - nfpm package --config ./build/linux/nfpm/nfpm.yaml --packager {{.FORMAT | default "deb"}} --target ./{{.BIN_DIR}}/
    vars:
      FORMAT: '{{.FORMAT | default "deb"}}'
    preconditions:
      - sh: command -v nfpm >/dev/null 2>&1
        msg: |
          nfpm not found in PATH.
          Install: go install github.com/goreleaser/nfpm/v2/cmd/nfpm@latest

  run:
    cmds:
      - './{{.BIN_DIR}}/{{.APP_NAME}}'
